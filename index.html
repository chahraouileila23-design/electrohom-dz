<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroHome DZ</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* Header */
header {
    background: #0a3d62;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Products */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

button {
    background: #0a3d62;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1e5f8a;
}

/* Footer */
footer {
    text-align: center;
    padding: 10px;
    background: #ddd;
}
</style>
</head>

<body>

<header>
    <h1>ElectroHome DZ</h1>
    <p>أفضل الأجهزة المنزلية بأسعار رائعة</p>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>خلاط كهربائي</h3>
        <p>4500 دج</p>
        <button onclick="order('خلاط كهربائي')">اطلب الآن</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>مكنسة كهربائية</h3>
        <p>12000 دج</p>
        <button onclick="order('مكنسة كهربائية')">اطلب الآن</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>مدفأة كهربائية</h3>
        <p>8000 دج</p>
        <button onclick="order('مدفأة كهربائية')">اطلب الآن</button>
    </div>

</div>

<footer>
    <p>© 2026 جميع الحقوق محفوظة</p>
</footer>

<script>
function order(productName) {
    let phone = "0553893672; // ضع رقمك هنا
    let message = "مرحبًا، أريد طلب: " + productName;
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}
</script>

</body>
</html>
